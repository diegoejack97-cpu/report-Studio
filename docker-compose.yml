services:
  # ── PostgreSQL ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: reportstudio
      POSTGRES_USER: rs_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rs_secret_2025}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rs_user -d reportstudio"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rs_net

  # ── Redis (sessions + rate limiting + job queue) ───────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-rs_redis_2025} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-rs_redis_2025}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - rs_net

  # ── FastAPI Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://rs_user:${DB_PASSWORD:-rs_secret_2025}@db:5432/reportstudio
      REDIS_URL: redis://:${REDIS_PASSWORD:-rs_redis_2025}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production_32chars_min}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-pk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-price_starter}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-price_pro}
      STRIPE_PRICE_BUSINESS: ${STRIPE_PRICE_BUSINESS:-price_business}
      CORS_ORIGINS: "http://localhost,http://localhost:3000,http://localhost:80,${APP_URL:-http://localhost}"
      ENVIRONMENT: ${ENVIRONMENT:-development}
      APP_URL: ${APP_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - report_storage:/app/storage
    networks:
      - rs_net
    ports:
      - "8000:8000"

  # ── React Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_APP_NAME: "Report Studio"
        VITE_STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-pk_test_placeholder}
    restart: unless-stopped
    networks:
      - rs_net

  # ── Nginx Reverse Proxy ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - rs_net

volumes:
  pgdata:
  redisdata:
  report_storage:

networks:
  rs_net:
    driver: bridge
